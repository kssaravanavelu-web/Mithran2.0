<!DOCTYPE html>
<html>
<head>
<title>Mithran</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Cinzel', serif;
    background-color: #080403;
    caret-color: transparent;
}

/* NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 8vh;
    position: fixed;
    width: 100%;
    z-index: 999;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
}
.navbar::after {
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:0.6px;
    background:white;
    box-shadow: 0 0 20px white;
}

/* MENU ICON */
.menu-icon-container {
    position: absolute;
    left: 20px;
    top: 18px;
    cursor: pointer;
    z-index: 1001;
}
.bar1,.bar2,.bar3{
    width:20px;
    height:2px;
    background:white;
    margin:4px 0;
}

/* 🔥 LOGO FIXED */
.logo-box {
    position: relative;
    width: 180px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-img {
    width: 40px;
    height: 36px;
    position: absolute;
    transition: 0.4s ease;
}

.logo-text {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 20px;
    font-family:montserrat;
    letter-spacing: 2px; /* 🔥 single line spacing */
    color: white;
    opacity: 0;
    transition: 0.4s ease;
}

/* HOVER EFFECT */
.logo-box:hover .logo-img {
    opacity: 0;
}
.logo-box:hover .logo-text {
    opacity: 1;
}

/* MENU */
.menu-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 30%;
    height: 100vh;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    transform: translateX(-100%);
    transition: transform 0.7s cubic-bezier(0.77,0,0.175,1);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 60px;
}
.menu-panel.active {
    transform: translateX(0);
}

.menu-content {
    text-align: right;
}
.menu-content a {
    display: block;
    font-size: 18px;
    color: white;
    margin: 20px 0;
    text-decoration: none;
    letter-spacing: 3px;
    transition: 0.3s;
}
.menu-content a:hover {
    opacity: 0.6;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 28px;
    color: white;
    cursor: pointer;
}

/* SECTIONS */
.section {
    width:100%;
    height:100vh;
    position:absolute;
    top:0;
    opacity:0;
    visibility:hidden;
    transition: transform 1s ease;
}
.section.active {
    opacity:1;
    visibility:visible;
}

/* VIDEO */
.bg-video {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* OVERLAY */
.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

/* CONTENT */
.slide-content {
    position:absolute;
    bottom:15%;
    left:28%;
}

/* 🔥 BUTTON */
.btn {
    position: relative;
    overflow: hidden;
    padding:12px 28px;
    border:1px solid rgba(255,255,255,0.6);
    background:transparent;
    color:white;
    cursor:pointer;
    transition:0.2s ease;
}

.btn:hover {
    background:white;
    color:black;
}

.btn:active {
    transform: scale(0.92);
}

/* RIPPLE */
.ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
}

@keyframes rippleAnim {
    to {
        transform: scale(4);
        opacity: 0;
    }
}

/* DOTS */
.dots {
    position: fixed;
    right: 25px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 999;
}
.dot {
    width: 6px;
    height: 6px;
    margin: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    cursor:pointer;
}
.dot.active {
    background: white;
    transform: scale(2);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="menu-icon-container" onclick="openMenu()">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
    </div>

    <!-- 🔥 FIXED LOGO -->
    <div class="logo-box">
        <img src="logo1.png" class="logo-img">
        <div class="logo-text">M I T H R A N</div>
    </div>

</div>

<!-- MENU -->
<div class="menu-panel" id="menu">
    <div class="close-btn" onclick="closeMenu()">✕</div>
    <div class="menu-content">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Report</a>
        <a href="#">Login</a>
    </div>
</div>

<!-- DOTS -->
<div class="dots">
    <div class="dot active" onclick="goToSlide(0)"></div>
    <div class="dot" onclick="goToSlide(1)"></div>
    <div class="dot" onclick="goToSlide(2)"></div>
    <div class="dot" onclick="goToSlide(3)"></div>
    <div class="dot" onclick="goToSlide(4)"></div>
</div>

<!-- SLIDES -->
<div class="section active">
    <video class="bg-video" autoplay muted loop>
        <source src="farmerbg.mp4">
    </video>
    <div class="overlay"></div>
    <div class="slide-content">
        <button class="btn">GET STARTED</button>
    </div>
</div>

<div class="section">
 <img class="bg-vedio" src="studentbg.jpg">
    <div class="overlay"></div>
</div>

<div class="section">
    <video class="bg-video" autoplay muted loop>
        <source src="video3.mp4">
    </video>
    <div class="overlay"></div>
</div>

<div class="section">
    <video class="bg-video" autoplay muted loop>
        <source src="video4.mp4">
    </video>
    <div class="overlay"></div>
</div>

<div class="section">
 <img class="bg-vedio" src="studentbg.jpg">
    <div class="overlay"></div>
</div>

<script>

let sections = document.querySelectorAll(".section");
let dots = document.querySelectorAll(".dot");

let current = 0;
let isScrolling = false;

function showSection(index){
    sections.forEach((sec,i)=>{
        sec.classList.toggle("active", i===index);
        sec.style.transform = `translateY(${(i - index) * 100}vh)`;
    });

    dots.forEach((dot,i)=>{
        dot.classList.toggle("active", i===index);
    });
}

function goToSlide(i){
    if(i<0 || i>=sections.length) return;
    current = i;
    showSection(current);
}

window.addEventListener("wheel",(e)=>{
    if(isScrolling) return;

    isScrolling = true;

    if(e.deltaY>0) current = Math.min(current+1, sections.length-1);
    else current = Math.max(current-1,0);

    showSection(current);

    setTimeout(()=> isScrolling=false, 900);
});

/* MENU */
function openMenu(){
    document.getElementById("menu").classList.add("active");
}
function closeMenu(){
    document.getElementById("menu").classList.remove("active");
}

/* RIPPLE */
document.querySelectorAll(".btn").forEach(button => {
    button.addEventListener("click", function(e){
        let circle = document.createElement("span");
        circle.classList.add("ripple");

        let rect = this.getBoundingClientRect();
        let size = Math.max(rect.width, rect.height);

        circle.style.width = circle.style.height = size + "px";
        circle.style.left = (e.clientX - rect.left - size/2) + "px";
        circle.style.top = (e.clientY - rect.top - size/2) + "px";

        this.appendChild(circle);

        setTimeout(()=> circle.remove(), 600);
    });
});

</script>

</body>
</html>
