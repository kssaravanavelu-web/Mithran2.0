<!DOCTYPE html>
<html>
<head>
<title>Mithran</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Bitter;
    background-color: black;
    height: 100vh;
    overflow: hidden;
    caret-color: transparent;
}

/* 🔥 BACKGROUND VIDEO */
.bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover; /* perfect fit */
    z-index: -2;
}

/* DARK OVERLAY */
.video-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 1s ease forwards;
    animation-delay: 2.2s;
}

.loader img {
    width: 80px;
    animation: logoReveal 1.5s ease forwards;
}

@keyframes logoReveal {
    0% { transform: scale(0.5); opacity: 0; filter: blur(10px);}
    100% { transform: scale(1); opacity: 1; filter: blur(0);}
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* PAGE */
.page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: scale(1.1);
    animation: pageZoom 1.2s ease forwards;
    animation-delay: 2.3s;
}

@keyframes pageZoom {
    to { opacity: 1; transform: scale(1); }
}

/* NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 8vh;
    position: fixed;
    width: 100%;
    z-index: 999;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
}

.navbar::after {
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:0.6px;
    background:white;
    box-shadow: 0 0 20px white;
}

/* MENU BUTTON */
.menu-btn {
    position: absolute;
    left: 15px;
    width: 26px;
    height: 18px;
    cursor: pointer;
}

.menu-btn span {
    position: absolute;
    width: 100%;
    height: 1.6px;
    background: white;
}

.menu-btn span:nth-child(1){top:0;}
.menu-btn span:nth-child(2){top:8px;}
.menu-btn span:nth-child(3){bottom:0;}

/* 🔥 PERFECT LOGO FIX */
.logo-box {
    position: relative;
    display: inline-block;
}

/* IMAGE */
.logo-img {
    width: 40px;
    height: 36px;
    transition: 0.4s ease;
}

/* TEXT */
.logo-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    white-space: nowrap;
    font-size: 20px;
    letter-spacing: 4px;
    color: white;

    opacity: 0;
    transition: 0.4s ease;
}

/* 🔥 CLEAN HOVER */
.logo-box:hover .logo-img {
    opacity: 0;
}

.logo-box:hover .logo-text {
    opacity: 1;
}

/* MENU PANEL */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 30%;
    height: 100vh;

    backdrop-filter: blur(20px);

    transform: translateX(-100%);
    transition: 0.7s;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    padding-right: 70px;
    z-index: 1000;
}

.sidebar.active {
    transform: translateX(0);
}

/* CLOSE BUTTON */
.close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 26px;
    color: white;
    cursor: pointer;
}

/* MENU LINKS */
.sidebar a {
    display: block;
    margin: 20px 0;
    color: white;
    text-decoration: none;
    font-size: 18px;
    letter-spacing: 2px;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.4s;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* CONTENT */
.center-content {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.quotes {
    color: silver;
    font-size: 25px;
    text-align: center;
}

/* BUTTON */
.btn {
    margin-top:40px;
    padding: 12px 28px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

.btn:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<!-- 🔥 VIDEO -->
<video class="bg-video" autoplay muted loop>
    <source src="indexbg.mp4">
</video>
<div class="video-overlay"></div>

<!-- LOADER -->
<div class="loader">
    <img src="logo1.png">
</div>

<div class="page">

<!-- NAVBAR -->
<div class="navbar">

    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="logo-box">
        <img src="logo1.png" class="logo-img">
        <div class="logo-text">M I T H R A N</div>
    </div>

</div>

<!-- MENU -->
<div class="sidebar" id="sidebar">
    <div class="close-btn" id="closeBtn">✕</div>

    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Report</a>
    <a href="#">Login</a>
</div>

<div class="overlay" id="overlay"></div>

<!-- CONTENT -->
<div class="center-content">
    <div class="quotes">
        Welcome To Mithran, Explore the Unexplored
    </div>

    <a href="Explore.html">
        <button class="btn">Explore More</button>
    </a>
</div>

</div>

<script>
const btn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");

btn.onclick = () => {
    sidebar.classList.add("active");
    overlay.classList.add("active");
};

closeBtn.onclick = () => {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
};

overlay.onclick = () => {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
};
</script>

</body>
</html>
